<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="../CSS/addToCart.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Comfortaa:wght@300..700&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <script type="module">
        import { injectNavbar } from "../JS/navbar.js";
        injectNavbar(false); // No search bar on cart
    </script>
    <h1>Your Cart</h1>
    <div id="products-Cart">
        <div id="prodImage-Div">

        </div>
    </div>
</body>

</html>

<script>
    async function loadCart() {
        const productsPage = document.getElementById("products-Cart");
        productsPage.innerHTML = ''; // Create clean slate

        try {
            const res = await fetch("/api/cart");
            if (!res.ok) {
                // If unauthorized or DB error, send to login
                window.location.href = "/auth.html";
                return;
            }

            const cartProducts = await res.json();

            if (cartProducts.length <= 0) {
                const emptyCartDiv = document.createElement("div");
                emptyCartDiv.id = "emptyCartDiv";

                const emptyCart = document.createElement("h1");
                emptyCart.innerText = "Oops! Looks like your cart is feeling lonely. Add some items to cheer it up!";
                emptyCart.id = "emptyCart-Text";

                const addProdsButton = document.createElement("button");
                addProdsButton.innerText = "Add Products?";
                addProdsButton.id = "addProdsButton";

                addProdsButton.onclick = () => {
                    window.location.href = "/products";
                };

                emptyCartDiv.append(emptyCart, addProdsButton);
                productsPage.append(emptyCartDiv);
                return;
            }

            cartProducts.forEach(elem => {
                const container = document.createElement("div");
                container.className = "cart-container";

                const prodImageDiv = document.createElement("div");
                prodImageDiv.id = "prodImage-Div";
                const prodDetailsDiv = document.createElement("div");
                prodDetailsDiv.id = "prodDetails-Div";

                const prodImg = document.createElement("img");
                let cartImg = elem.image;
                try {
                    if (typeof cartImg === "string" && cartImg.startsWith("[")) {
                        const parsed = JSON.parse(cartImg);
                        cartImg = Array.isArray(parsed) && parsed.length > 0 ? parsed[0] : cartImg;
                    }
                } catch (e) { }
                prodImg.setAttribute('src', cartImg || "../images/placeholder.jpg");
                prodImg.setAttribute('onerror', "this.src='../images/placeholder.jpg'");
                prodImg.className = "prodImage";

                const qty_div = document.createElement("div");
                qty_div.id = "qty-div";

                const decButton = document.createElement("button");
                decButton.innerText = "-";
                decButton.className = "qty-minus";

                const qtySpan = document.createElement("span");
                qtySpan.innerText = elem.quantity;
                qtySpan.className = "qty-count";

                const incButton = document.createElement("button");
                incButton.innerText = "+";
                incButton.className = "qty-plus";

                // Increment hitting PUT route
                incButton.addEventListener("click", async () => {
                    const nextQty = elem.quantity + 1;
                    if (elem.stock && nextQty > elem.stock) {
                        alert("Stock availability is only " + elem.stock);
                        return;
                    }
                    await fetch(`/api/cart/${elem.cart_item_id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ quantity: nextQty })
                    });
                    loadCart(); // redraw
                });

                // Decrement hitting PUT route (removes if < 1 handled by backend)
                decButton.onclick = async () => {
                    await fetch(`/api/cart/${elem.cart_item_id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ quantity: elem.quantity - 1 })
                    });
                    loadCart();
                };

                qty_div.append(incButton, qtySpan, decButton);

                const prodDetails = document.createElement("div");
                const prodName = document.createElement("h3");

                // Parse spec securely if it's there
                let brand = "";
                try {
                    if (elem.specifications) brand = JSON.parse(elem.specifications).brand || "";
                } catch (e) { }
                prodName.innerText = brand + ' ' + elem.name;

                const prodDesc = document.createElement("p");
                prodDesc.innerText = elem.description;

                const incPrice = document.createElement("del");
                incPrice.innerText = "₹" + elem.discount;

                const decPrice = document.createElement("h2");
                decPrice.innerText = "₹" + elem.price;
                decPrice.className = "prodPrice";

                const rating = document.createElement("p");
                rating.className = "prodRating";
                rating.innerText = "⭐" + elem.rating + "/5";

                const removeButton = document.createElement("button");
                removeButton.id = "removeItemBtn";
                removeButton.innerText = "Remove";

                removeButton.addEventListener("click", async () => {
                    await fetch(`/api/cart/${elem.cart_item_id}`, { method: 'DELETE' });
                    loadCart();
                });

                prodImageDiv.append(prodImg, qty_div);
                prodDetailsDiv.append(prodName, prodDesc, decPrice, incPrice, rating, removeButton);
                container.append(prodImageDiv, prodDetailsDiv);
                productsPage.append(container);
            });

            const placeOrderBtn = document.createElement("button");
            placeOrderBtn.innerText = "Proceed to checkout";
            placeOrderBtn.className = "place-order-btn";

            placeOrderBtn.addEventListener("click", () => {
                window.location.href = "/checkout";
            });

            productsPage.appendChild(placeOrderBtn);

        } catch (error) {
            console.error("Cart error:", error);
        }
    }

    // Boot up
    loadCart();
</script>
