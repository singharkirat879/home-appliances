<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Preview</title>
    <link rel="stylesheet" href="../CSS/checkout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <script type="module">
        import { injectNavbar } from "../JS/navbar.js";
        injectNavbar(false);
    </script>
    <div class="checkout-wrapper">
        <div class="checkout-card">
            <div class="header">
                <h2>Review Your Order</h2>
                <a href="/addToCart.html" class="back-link">← Back to Cart</a>
            </div>
            
            <div id="order-items-preview" class="order-items-scroll">
                <!-- Injected via checkout.js -->
                <p>Loading your cart preview...</p>
            </div>
            
            <div class="delivery-details">
                <h3>Delivery Details</h3>
                <div class="form-group">
                    <label for="shipping-address">Shipping Address</label>
                    <textarea id="shipping-address" rows="2" placeholder="Enter your full delivery address" required></textarea>
                </div>
                <div class="form-group">
                    <label for="phone-number">Phone Number</label>
                    <input type="tel" id="phone-number" placeholder="Enter 10-digit mobile number" maxlength="10" required>
                </div>
            </div>
            
            <div class="summary-section">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal-amount">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Estimated Tax & Delivery</span>
                    <span>Free</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total Amount</span>
                    <span id="total-amount">₹0.00</span>
                </div>
                
                <button id="confirmPurchaseBtn" class="confirm-btn">Confirm Purchase</button>
            </div>
            
            <div id="success-overlay" class="overlay hidden">
                <div class="overlay-content">
                    <h1>🎉 Success!</h1>
                    <p>Your order has been placed. You're being redirected...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="../JS/checkout.js"></script>
</body>
</html>
