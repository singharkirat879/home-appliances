<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeEase - Welcome</title>
    <link rel="stylesheet" href="../CSS/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Login Form -->
            <div id="login-section" class="form-box login-box">
                <h2>Welcome Back</h2>
                <p>Sign in to continue to HomeEase.</p>
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit" class="auth-btn">Sign In</button>
                    <div id="loginError" class="error-text"></div>
                </form>
                <p class="switch-text">Don't have an account? <span id="showRegister">Create one</span></p>
            </div>

            <!-- Register Form -->
            <div id="register-section" class="form-box register-box hide">
                <h2>Create Account</h2>
                <p>Join HomeEase today.</p>
                <form id="registerForm">
                    <input type="text" id="registerName" placeholder="Full Name" required>
                    <input type="email" id="registerEmail" placeholder="Email Address" required>
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <button type="submit" class="auth-btn">Sign Up</button>
                    <div id="registerError" class="error-text"></div>
                </form>
                <p class="switch-text">Already have an account? <span id="showLogin">Sign In</span></p>
            </div>
        </div>
    </div>

    <script src="../JS/auth.js"></script>
</body>
</html>
