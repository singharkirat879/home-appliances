<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - HomeEase</title>
    <link rel="stylesheet" href="../CSS/product_detail.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <script type="module">
        import { injectNavbar } from "../JS/navbar.js";
        injectNavbar(false); // Injects the global navbar
    </script>

    <div class="container main-content">
        <div class="row" id="product-detail-container">
            <!-- Loading State -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Fetching product details...</p>
            </div>
        </div>
    </div>

    <!-- Script to load data -->
    <script type="module" src="../JS/product_detail.js"></script>
</body>
</html>
