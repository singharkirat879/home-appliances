<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="../CSS/products.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Comfortaa:wght@300..700&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- NAVBAR Injected Dynamically by JS -->

    <div class="ProductPage-Div">
        <div id="sidebar">
            <p id="filter-topic"> Filters </p>
            <div id="filterPrice-Div">
                <p id="filterPrice">Price</p>

                <div id="inputPriceFilter">
                    <input type="radio" name="choice" value="lowToHigh" id="lowToHighRad"> Sort Low to High <br>
                    <input type="radio" name="choice" value="highToLow" id="highToLowRad"> Sort High to Low <br>
                </div>
            </div>
            <div id="filterRating-Div" style="margin-top: 25px;">
                <p id="filterRating" style="font-weight: 600; font-size: 18px;">Product Rating</p>
                <div id="inputRatingFilter" style="margin-top: 10px;">
                    <input type="radio" name="choice" value="highestRating"> Highest Rated First <br>
                </div>
            </div>
            <div id="filterStock-Div" style="margin-top: 25px; margin-bottom: 25px;">
                <p style="font-weight: 600; font-size: 18px;">Inventory</p>
                <input type="checkbox" id="inStockCheck"> In Stock Only <br>
            </div>
            <button id="clearFiltersBtn" class="remove-filters-btn">Clear All Filters</button>
        </div>

        <div id="ProductPage">
            <div class="categoryBtn-Div">
                <button onclick="categoryFilter()" data-id="all" class="categoryBtn">All</button>
                <button onclick="categoryFilter()" data-id="electronics" class="categoryBtn">Electronic
                    Appliances</button>
                <button onclick="categoryFilter()" data-id="furniture" class="categoryBtn">Furniture Appliances</button>
                <button onclick="categoryFilter()" data-id="kitchen" class="categoryBtn">Kitchen Appliances</button>
                <button onclick="categoryFilter()" data-id="home_decor" class="categoryBtn">Home Decor</button>
                <button onclick="categoryFilter()" data-id="bedding" class="categoryBtn">Bedding & Linens</button>
                <button onclick="categoryFilter()" data-id="bath" class="categoryBtn">Bath & Towels</button>
                <button onclick="categoryFilter()" data-id="lighting" class="categoryBtn">Lighting</button>
            </div>

            <div id="Products">

            </div>

        </div>

    </div>


</body>

</html>
<script type="module" src="../JS/products.js"> </script>
