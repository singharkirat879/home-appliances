<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomeEase - Admin Panel</title>
    <link rel="stylesheet" href="../CSS/home.css">
    <link rel="stylesheet" href="../CSS/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Login Screen -->
    <div id="admin-login-screen" class="admin-login-container">
        <div class="glass-card login-card">
            <h2>Admin Login</h2>
            <form id="admin-login-form">
                <div class="input-group">
                    <label for="admin-username">Username</label>
                    <input type="text" id="admin-username" required>
                </div>
                <div class="input-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="cta-btn glowing">Login</button>
                <p id="login-error" class="error-msg" style="display: none;"></p>
            </form>
            <button onclick="window.location.href='/'" class="back-home-btn">Back to Home</button>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="admin-dashboard-screen" class="admin-dashboard" style="display: none;">
        <!-- Sidebar -->
        <aside class="admin-sidebar glassmorphism-heavy">
            <div class="sidebar-header">
                <i data-lucide="shield-check" class="admin-logo-icon"></i>
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active"><i data-lucide="package"></i> Products</a>
                <a href="#" id="logout-btn"><i data-lucide="log-out"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header glass-card">
                <h1>Product Management</h1>
                <button id="add-product-btn" class="cta-btn glowing"><i data-lucide="plus"></i> Add Product</button>
            </header>

            <section class="admin-content glass-card">
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-table-body">
                            <!-- Products will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Product Modal (Add/Edit) -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-card">
            <h2 id="modal-title">Add Product</h2>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="prod-name">Name</label>
                        <input type="text" id="prod-name" required>
                    </div>
                    <div class="input-group">
                        <label for="prod-category">Category</label>
                        <select id="prod-category" required>
                            <option value="kitchen">Kitchen</option>
                            <option value="lighting">Lighting</option>
                            <option value="electronics">Electronics (Air & Cleaning)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="prod-price">Price (₹)</label>
                        <input type="number" id="prod-price" required>
                    </div>
                    <div class="input-group">
                        <label for="prod-discount">Discount (%)</label>
                        <input type="number" id="prod-discount" value="0">
                    </div>
                    <div class="input-group">
                        <label for="prod-stock">Stock</label>
                        <input type="number" id="prod-stock" value="10">
                    </div>
                    <div class="input-group">
                        <label for="prod-rating">Rating (0-5)</label>
                        <input type="number" step="0.1" id="prod-rating" value="4.5">
                    </div>
                    <div class="input-group full-width">
                        <label for="prod-image">Images (JSON Array or single URL string)</label>
                        <input type="text" id="prod-image" placeholder='["https://..."]'>
                    </div>
                    <div class="input-group full-width">
                        <label for="prod-desc">Description</label>
                        <textarea id="prod-desc" rows="3" required></textarea>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="close-modal-btn" class="cancel-btn">Cancel</button>
                    <button type="submit" class="cta-btn glowing">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../JS/admin.js"></script>
</body>
</html>
